<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qamar Library</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f7fb;
      padding:30px;
    }

    .container{
      max-width:700px;
      margin:auto;
      background:white;
      padding:30px;
      border-radius:15px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      color:#ff6600;
    }

    input{
      width:100%;
      padding:14px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:10px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:14px;
      background:#ff6600;
      border:none;
      color:white;
      font-size:18px;
      border-radius:10px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#e65c00;
    }

    .students{
      margin-top:30px;
    }

    .card{
      background:#f1f3f6;
      padding:15px;
      border-radius:10px;
      margin-bottom:12px;
    }

    .card h3{
      margin-bottom:5px;
      color:#222;
    }

    .card p{
      color:#555;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>Qamar Library</h1>

  <input type="text" id="name" placeholder="Enter Student Name">

  <input type="text" id="mobile" placeholder="Enter Mobile Number">

  <button onclick="saveData()">Save Student</button>

  <div class="students" id="studentsList"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

 apiKey: "AIzaSyDXl60NQHJV2J1iEV6-SjF61197FWVtdNk",

 authDomain: "qamar-library.firebaseapp.com",

 projectId: "qamar-library",

 storageBucket: "qamar-library.firebasestorage.app",

 messagingSenderId: "256574977198",

 appId: "1:256574977198:web:0241dcc68ac5de4bea293f",

 measurementId: "G-D3ZTCF8TJX"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.saveData = async function () {

  const name = document.getElementById("name").value;
  const mobile = document.getElementById("mobile").value;

  if(name === "" || mobile === ""){
    alert("Please Fill All Fields");
    return;
  }

  try {

    await addDoc(collection(db, "students"), {
      name: name,
      mobile: mobile,
      time: new Date()
    });

    alert("Data Saved Successfully");

    document.getElementById("name").value = "";
    document.getElementById("mobile").value = "";

    loadStudents();

  } catch(error) {

    console.error(error);
    alert(error.message);

  }

}

async function loadStudents(){

  const studentsList = document.getElementById("studentsList");

  studentsList.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "students"));

  querySnapshot.forEach((doc) => {

    const data = doc.data();

    studentsList.innerHTML += `
      <div class="card">
        <h3>${data.name}</h3>
        <p>${data.mobile}</p>
      </div>
    `;

  });

}

loadStudents();

</script>

</body>
</html>

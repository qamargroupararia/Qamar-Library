<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QAMAR LIBRARY PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#ff6a00,#ee0979);
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:1400px;
  margin:auto;
}

.header{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  border-radius:25px;
  padding:25px;
  margin-bottom:25px;
  color:white;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.header h1{
  font-size:42px;
  margin-bottom:8px;
}

.header p{
  opacity:0.9;
}

.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:25px;
}

.stat-card{
  background:white;
  padding:25px;
  border-radius:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.stat-card h2{
  font-size:38px;
  color:#ff6a00;
}

.stat-card p{
  color:#666;
  margin-top:5px;
}

.main-grid{
  display:grid;
  grid-template-columns:380px 1fr;
  gap:25px;
}

.panel{
  background:white;
  border-radius:25px;
  padding:25px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.panel h2{
  margin-bottom:20px;
  color:#222;
}

input,
select{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border:1px solid #ddd;
  border-radius:12px;
  font-size:15px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#ff6a00,#ee0979);
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:translateY(-2px);
}

.student-list{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.student-card{
  background:#f7f7f7;
  border-radius:18px;
  padding:20px;
  position:relative;
  overflow:hidden;
}

.student-card::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:6px;
  background:linear-gradient(90deg,#ff6a00,#ee0979);
}

.student-card h3{
  margin-bottom:10px;
}

.student-card p{
  color:#666;
  margin-bottom:6px;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.actions button{
  flex:1;
  padding:10px;
  font-size:14px;
}

.delete-btn{
  background:#e53935;
}

.edit-btn{
  background:#222;
}

.seat-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-top:15px;
}

.seat{
  padding:18px 10px;
  border-radius:12px;
  text-align:center;
  font-weight:600;
  cursor:pointer;
}

.available{
  background:#d4edda;
  color:#155724;
}

.booked{
  background:#f8d7da;
  color:#721c24;
}

.search-box{
  margin-bottom:20px;
}

@media(max-width:1000px){

.main-grid{
  grid-template-columns:1fr;
}

}

@media(max-width:600px){

.seat-grid{
  grid-template-columns:repeat(3,1fr);
}

.header h1{
  font-size:30px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="header">
  <h1>QAMAR LIBRARY PRO</h1>
  <p>Advanced Library + Seat Booking + Student Management System</p>
</div>

<div class="dashboard">

  <div class="stat-card">
    <h2 id="totalStudents">0</h2>
    <p>Total Students</p>
  </div>

  <div class="stat-card">
    <h2 id="availableSeats">0</h2>
    <p>Available Seats</p>
  </div>

  <div class="stat-card">
    <h2 id="bookedSeats">0</h2>
    <p>Booked Seats</p>
  </div>

  <div class="stat-card">
    <h2 id="totalSeats">30</h2>
    <p>Total Seats</p>
  </div>

</div>

<div class="main-grid">

<div class="panel">

<h2>Add Student</h2>

<input type="text" id="name" placeholder="Student Name">

<input type="text" id="mobile" placeholder="Mobile Number">

<select id="seatNumber">
<option value="">Select Seat</option>
</select>

<button onclick="saveStudent()">
Save Student
</button>

<hr style="margin:25px 0;opacity:0.2;">

<h2>Seat Status</h2>

<div class="seat-grid" id="seatGrid"></div>

</div>

<div class="panel">

<h2>Student Records</h2>

<input type="text" id="searchInput" class="search-box" placeholder="Search Student..." onkeyup="searchStudents()">

<div class="student-list" id="studentList"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "YOUR_API_KEY",

  authDomain: "qamar-library.firebaseapp.com",

  projectId: "qamar-library",

  storageBucket: "qamar-library.appspot.com",

  messagingSenderId: "256574977198",

  appId: "1:256574977198:web:0241dcc68ac5de4bea293f"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const totalSeats = 30;

window.saveStudent = async function(){

  const name = document.getElementById('name').value.trim();
  const mobile = document.getElementById('mobile').value.trim();
  const seat = document.getElementById('seatNumber').value;

  if(name === '' || mobile === '' || seat === ''){
    alert('Please Fill All Fields');
    return;
  }

  await addDoc(collection(db,'students'),{
    name,
    mobile,
    seat,
    createdAt:new Date()
  });

  document.getElementById('name').value='';
  document.getElementById('mobile').value='';
  document.getElementById('seatNumber').value='';

  loadStudents();

}

async function loadStudents(){

  const snapshot = await getDocs(collection(db,'students'));

  const studentList = document.getElementById('studentList');
  const seatGrid = document.getElementById('seatGrid');
  const seatNumber = document.getElementById('seatNumber');

  studentList.innerHTML='';
  seatGrid.innerHTML='';
  seatNumber.innerHTML='<option value="">Select Seat</option>';

  let bookedSeats = [];

  document.getElementById('totalStudents').innerText = snapshot.size;

  snapshot.forEach((student)=>{

    const data = student.data();

    bookedSeats.push(data.seat);

    studentList.innerHTML += `

      <div class="student-card">

        <h3>${data.name}</h3>

        <p>📞 ${data.mobile}</p>

        <p>💺 Seat : ${data.seat}</p>

        <div class="actions">

          <button class="delete-btn" onclick="deleteStudent('${student.id}')">
          Delete
          </button>

        </div>

      </div>

    `;

  });

  let available = 0;

  for(let i=1;i<=totalSeats;i++){

    if(bookedSeats.includes(String(i))){

      seatGrid.innerHTML += `
      <div class="seat booked">${i}</div>
      `;

    }else{

      available++;

      seatGrid.innerHTML += `
      <div class="seat available">${i}</div>
      `;

      seatNumber.innerHTML += `
      <option value="${i}">Seat ${i}</option>
      `;

    }

  }

  document.getElementById('availableSeats').innerText = available;

  document.getElementById('bookedSeats').innerText = totalSeats - available;

}

window.deleteStudent = async function(id){

  if(confirm('Delete Student?')){

    await deleteDoc(doc(db,'students',id));

    loadStudents();

  }

}

window.searchStudents = function(){

  const input = document.getElementById('searchInput').value.toLowerCase();

  const cards = document.querySelectorAll('.student-card');

  cards.forEach(card=>{

    if(card.innerText.toLowerCase().includes(input)){
      card.style.display='block';
    }else{
      card.style.display='none';
    }

  });

}

loadStudents();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Qamar Library</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#ff6a00,#ee0979);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:25px;
}

.container{
  width:100%;
  max-width:900px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:30px;
  padding:35px;
  box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

.logo{
  text-align:center;
  color:white;
  font-size:45px;
  font-weight:700;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:white;
  opacity:0.9;
  margin-bottom:30px;
  font-size:16px;
}

.form-box{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

input{
  width:100%;
  padding:16px;
  border:none;
  outline:none;
  border-radius:15px;
  background:rgba(255,255,255,0.9);
  font-size:16px;
}

button{
  grid-column:1/3;
  padding:16px;
  border:none;
  border-radius:15px;
  background:#111;
  color:white;
  font-size:18px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#000;
  transform:translateY(-3px);
}

.stats{
  margin-top:25px;
  background:rgba(255,255,255,0.2);
  padding:15px;
  border-radius:15px;
  text-align:center;
  color:white;
  font-size:20px;
  font-weight:600;
}

.students{
  margin-top:30px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  background:white;
  border-radius:20px;
  padding:22px;
  position:relative;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:6px;
  background:linear-gradient(90deg,#ff6a00,#ee0979);
}

.card h3{
  color:#222;
  margin-bottom:10px;
  font-size:24px;
}

.card p{
  color:#666;
  font-size:17px;
}

@media(max-width:768px){

  .form-box{
    grid-template-columns:1fr;
  }

  button{
    grid-column:auto;
  }

  .students{
    grid-template-columns:1fr;
  }

  .logo{
    font-size:34px;
  }

}

</style>

</head>

<body>

<div class="container">

<h1 class="logo">Qamar Library</h1>

<p class="subtitle">
Smart Student Management System
</p>

<div class="form-box">

<input 
type="text" 
id="name" 
placeholder="Enter Student Name"
>

<input 
type="text" 
id="mobile" 
placeholder="Enter Mobile Number"
>

<button onclick="saveData()">
Save Student
</button>

</div>

<div class="stats" id="totalStudents">
Total Students : 0
</div>

<div class="students" id="studentsList"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyDXl60NQHJV2J1iEV6-SjF61197FWVtdNk",

  authDomain: "qamar-library.firebaseapp.com",

  projectId: "qamar-library",

  storageBucket: "qamar-library.appspot.com",

  messagingSenderId: "256574977198",

  appId: "1:256574977198:web:0241dcc68ac5de4bea293f",

  measurementId: "G-D3ZTCF8TJX"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.saveData = async function(){

  const name = document.getElementById("name").value.trim();

  const mobile = document.getElementById("mobile").value.trim();

  if(name === "" || mobile === ""){

    alert("Please Fill All Fields");

    return;

  }

  try{

    await addDoc(collection(db,"students"),{

      name:name,
      mobile:mobile,
      time:new Date()

    });

    document.getElementById("name").value="";

    document.getElementById("mobile").value="";

    loadStudents();

  }

  catch(error){

    console.error(error);

    alert(error.message);

  }

};

async function loadStudents(){

  const studentsList = document.getElementById("studentsList");

  const totalStudents = document.getElementById("totalStudents");

  studentsList.innerHTML = "";

  try{

    const querySnapshot = await getDocs(collection(db,"students"));

    totalStudents.innerHTML =
    `Total Students : ${querySnapshot.size}`;

    querySnapshot.forEach((doc)=>{

      const data = doc.data();

      studentsList.innerHTML += `

      <div class="card">

        <h3>${data.name}</h3>

        <p>📞 ${data.mobile || "No Number"}</p>

      </div>

      `;

    });

  }

  catch(error){

    console.error(error);

  }

}

loadStudents();

</script>

</body>

</html>

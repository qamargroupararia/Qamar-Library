<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Qamar Library Dashboard</title>

<link rel="stylesheet"
href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="sidebar">

<h1 class="logo">
📚 QAMAR LIBRARY
</h1>

<p class="subtitle">
Smart Management System
</p>

<div class="menu">

<a href="#">
🏠 Dashboard
</a>

<a href="#">
👨‍🎓 Students
</a>

<a href="#">
💺 Seat Booking
</a>

<a href="#">
📊 Reports
</a>

<a href="#">
⚙ Settings
</a>

</div>

</div>

<div class="main">

<div class="topbar">

<h1>
Dashboard
</h1>

<input 
type="text"
placeholder="Search students..."
class="search"
id="searchInput">

</div>

<div class="cards">

<div class="card purple">

<h2 id="totalStudents">
0
</h2>

<p>Total Students</p>

</div>

<div class="card blue">

<h2>
60
</h2>

<p>Total Seats</p>

</div>

<div class="card green">

<h2 id="availableSeats">
0
</h2>

<p>Available Seats</p>

</div>

<div class="card orange">

<h2 id="todayBookings">
0
</h2>

<p>Today Bookings</p>

</div>

</div>

<div class="content-grid">

<div class="panel">

<h2>Add Student</h2>

<input type="text"
id="studentName"
placeholder="Student Name">

<input type="text"
id="studentMobile"
placeholder="Mobile Number">

  <select id="seatSelect">
<option value="">
Select Seat
</option>

</select>
<button onclick="saveStudent()">
Save Student
</button>

</div>

<div class="panel">

<h2>Seat Availability</h2>

<div id="seatGrid"
class="seat-grid">

</div>

</div>

<div class="panel">

<h2>Recent Students</h2>

<div id="recentStudents">

</div>

</div>

</div>

<div class="table-section">

<h2>
All Students
</h2>

<table>

<thead>

<tr>

<th>#</th>
<th>Name</th>
<th>Mobile</th>
<th>Seat</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="studentsTable">

</tbody>

</table>

</div>

</div>

<script type="module"
src="js/dashboard.js">
</script>

</body>
</html>
